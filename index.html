<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>🎟️ Control de Rifa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e; min-height: 100vh;
      padding: 20px 14px 50px; color: #fff;
    }
    .header { text-align: center; margin-bottom: 18px; }
    .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
    .header p { font-size: 12px; color: #a0a0c0; margin-top: 4px; }
    .stats { display: flex; gap: 10px; max-width: 420px; margin: 0 auto 14px; }
    .stat { background: #16213e; border: 1px solid #2a2a5a; border-radius: 14px; padding: 12px 10px; text-align: center; flex: 1; }
    .stat .n { font-size: 26px; font-weight: 800; line-height: 1; }
    .stat .l { font-size: 10px; color: #a0a0c0; margin-top: 3px; text-transform: uppercase; letter-spacing: .5px; }
    .progress-wrap { max-width: 420px; margin: 0 auto 16px; background: #16213e; border-radius: 20px; height: 8px; overflow: hidden; border: 1px solid #2a2a5a; }
    .progress-bar { height: 100%; background: linear-gradient(90deg,#f72585,#7209b7); border-radius: 20px; transition: width .3s ease; }
    .tombola-btn {
      display: block; margin: 0 auto 20px;
      background: linear-gradient(135deg,#7209b7,#f72585);
      color: #fff; font-size: 15px; font-weight: 700;
      padding: 14px 32px; border-radius: 30px; border: none;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 20px rgba(247,37,133,.35);
    }
    .tombola-btn:active { transform: scale(.96); }
    .grid { display: grid; grid-template-columns: repeat(10,1fr); gap: 5px; max-width: 420px; margin: 0 auto; }
    .btn {
      aspect-ratio: 1; border-radius: 8px;
      border: 2px solid #2a2a5a; background: #16213e;
      color: #c8c8e8; font-size: 11px; font-weight: 700;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none; font-family: inherit;
      padding: 2px; gap: 1px; transition: transform .1s;
    }
    .btn:active { transform: scale(.85); }
    .btn.sold { background: #f72585; border-color: #f72585; color: #fff; }
    .btn .num { font-size: 11px; font-weight: 800; line-height: 1; }
    .btn .name { font-size: 6.5px; font-weight: 600; opacity: .92; text-align: center; width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .legend { display: flex; justify-content: center; gap: 20px; margin-top: 16px; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #a0a0c0; }
    .dot { width: 14px; height: 14px; border-radius: 4px; }
    .reset-btn { display: block; margin: 24px auto 0; background: transparent; border: 1px solid #3a3a6a; color: #a0a0c0; font-size: 13px; padding: 10px 24px; border-radius: 20px; cursor: pointer; font-family: inherit; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 50; align-items: center; justify-content: center; padding: 20px; }
    .overlay.show { display: flex; }
    .modal-name { background: #16213e; border-radius: 20px; width: 100%; max-width: 340px; padding: 24px; border: 1px solid #2a2a5a; }
    .modal-name h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .modal-name p { font-size: 13px; color: #a0a0c0; margin-bottom: 16px; }
    .modal-name input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 2px solid #2a2a5a; background: #0f172a; color: #fff; font-size: 15px; font-family: inherit; outline: none; margin-bottom: 16px; }
    .modal-name input:focus { border-color: #f72585; }
    .modal-name .btns { display: flex; gap: 10px; flex-wrap: wrap; }
    .modal-name .btns button { flex: 1; padding: 12px 8px; border-radius: 12px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; min-width: 70px; }
    .btn-cancel2 { background: #2a2a5a; color: #a0a0c0; }
    .btn-save { background: #f72585; color: #fff; }
    .btn-unsell { background: #2a2a5a; color: #ff6b9d; border: 1px solid #f72585 !important; }
    .overlay-bottom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 50; align-items: flex-end; justify-content: center; }
    .overlay-bottom.show { display: flex; }
    .modal-reset { background: #16213e; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 28px 24px 44px; border-top: 1px solid #2a2a5a; }
    .modal-reset h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal-reset p { font-size: 14px; color: #a0a0c0; margin-bottom: 24px; }
    .modal-btns { display: flex; gap: 12px; }
    .modal-btns button { flex: 1; padding: 14px; border-radius: 14px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
    .btn-cancel { background: #2a2a5a; color: #a0a0c0; }
    .btn-confirm { background: #f72585; color: #fff; }
    .tombola-modal { background: #16213e; border-radius: 24px; width: 100%; max-width: 300px; padding: 32px 24px 28px; border: 1px solid #2a2a5a; text-align: center; }
    .tombola-title { font-size: 13px; color: #a0a0c0; margin-bottom: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .tombola-drum {
      width: 150px; height: 150px; border-radius: 50%;
      background: linear-gradient(135deg,#7209b7,#f72585);
      margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(247,37,133,.4);
    }
    .tombola-drum.spinning { animation: glow .1s linear infinite alternate; }
    @keyframes glow {
      from { box-shadow: 0 0 30px rgba(247,37,133,.5); }
      to   { box-shadow: 0 0 70px rgba(114,9,183,.9); }
    }
    .drum-number { font-size: 50px; font-weight: 900; color: #fff; }
    .tombola-winner-name { font-size: 17px; font-weight: 700; color: #f72585; margin-bottom: 20px; min-height: 24px; }
    .t-btns { display: flex; gap: 10px; justify-content: center; }
    .t-btns button { padding: 12px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
    .t-spin { background: linear-gradient(135deg,#7209b7,#f72585); color: #fff; }
    .t-close { background: #2a2a5a; color: #a0a0c0; }
  </style>
</head>
<body>

<div class="header">
  <div style="font-size:28px;margin-bottom:4px">🎟️</div>
  <h1>Control de Rifa</h1>
  <p>Toca un número para registrar quién lo compró</p>
</div>

<div class="stats">
  <div class="stat"><div class="n" style="color:#f72585" id="n-sold">0</div><div class="l">Vendidos</div></div>
  <div class="stat"><div class="n" style="color:#4cc9f0" id="n-avail">250</div><div class="l">Disponibles</div></div>
  <div class="stat"><div class="n" style="color:#7b8cde">250</div><div class="l">Total</div></div>
</div>

<div class="progress-wrap">
  <div class="progress-bar" id="progress" style="width:0%"></div>
</div>

<button class="tombola-btn" onclick="openTombola()">🎰 Girar Tómbola</button>

<div class="grid" id="grid"></div>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background:#16213e;border:2px solid #2a2a5a"></div>Libre</div>
  <div class="legend-item"><div class="dot" style="background:#f72585"></div>Vendido</div>
</div>

<button class="reset-btn" onclick="document.getElementById('ov-reset').classList.add('show')">Reiniciar todo</button>

<!-- MODAL NOMBRE -->
<div class="overlay" id="ov-name" onclick="if(event.target===this)closeNameModal()">
  <div class="modal-name">
    <h2 id="m-title">Número 0</h2>
    <p id="m-sub">Escribe el nombre de quien compró este número</p>
    <input type="text" id="name-input" placeholder="Nombre..." maxlength="18" autocomplete="off" autocorrect="off"/>
    <div class="btns">
      <button class="btn-cancel2" onclick="closeNameModal()">Cancelar</button>
      <button class="btn-unsell" id="btn-unsell" onclick="unsellNumber()" style="display:none">Quitar venta</button>
      <button class="btn-save" onclick="saveNumber()">✓ Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL RESET -->
<div class="overlay-bottom" id="ov-reset" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal-reset">
    <h2>¿Reiniciar la rifa?</h2>
    <p>Se borrarán los 250 números y todos los nombres. No se puede deshacer.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('ov-reset').classList.remove('show')">Cancelar</button>
      <button class="btn-confirm" onclick="resetAll()">Sí, reiniciar</button>
    </div>
  </div>
</div>

<!-- MODAL TÓMBOLA -->
<div class="overlay" id="ov-tombola" onclick="if(event.target===this)closeTombola()">
  <div class="tombola-modal">
    <div class="tombola-title">🎰 Tómbola</div>
    <div class="tombola-drum" id="drum">
      <span class="drum-number" id="drum-num">?</span>
    </div>
    <div class="tombola-winner-name" id="t-name"></div>
    <div class="t-btns">
      <button class="t-spin" onclick="spinTombola()">Girar</button>
      <button class="t-close" onclick="closeTombola()">Cerrar</button>
    </div>
  </div>
</div>

<script>
  const TOTAL     = 250;
  const KEY_SOLD  = 'rifa_sold_v3';
  const KEY_NAMES = 'rifa_names_v3';

  let sold  = new Set(JSON.parse(localStorage.getItem(KEY_SOLD)  || '[]'));
  let names = JSON.parse(localStorage.getItem(KEY_NAMES) || '{}');
  let activeNum  = null;
  let spinTimer  = null;

  function save() {
    localStorage.setItem(KEY_SOLD,  JSON.stringify([...sold]));
    localStorage.setItem(KEY_NAMES, JSON.stringify(names));
  }

  function updateStats() {
    document.getElementById('n-sold').textContent  = sold.size;
    document.getElementById('n-avail').textContent = TOTAL - sold.size;
    document.getElementById('progress').style.width = (sold.size / TOTAL * 100) + '%';
  }

  function render() {
    const grid = document.getElementById('grid');
    const existing = grid.querySelectorAll('.btn');
    if (existing.length === TOTAL) {
      existing.forEach((btn, i) => {
        const n = i + 1;
        const isSold = sold.has(n);
        btn.className = 'btn' + (isSold ? ' sold' : '');
        btn.innerHTML = `<span class="num">${n}</span>${isSold && names[n] ? `<span class="name">${names[n]}</span>` : ''}`;
      });
    } else {
      grid.innerHTML = '';
      for (let i = 1; i <= TOTAL; i++) {
        const btn = document.createElement('button');
        const isSold = sold.has(i);
        btn.className = 'btn' + (isSold ? ' sold' : '');
        btn.innerHTML = `<span class="num">${i}</span>${isSold && names[i] ? `<span class="name">${names[i]}</span>` : ''}`;
        btn.onclick = () => openNameModal(i);
        grid.appendChild(btn);
      }
    }
    updateStats();
  }

  /* ── NOMBRE MODAL ── */
  function openNameModal(n) {
    activeNum = n;
    const isSold = sold.has(n);
    document.getElementById('m-title').textContent = `Número ${n}`;
    document.getElementById('m-sub').textContent   = isSold
      ? `Comprado por: ${names[n] || 'sin nombre'}`
      : 'Escribe el nombre de quien compró este número';
    document.getElementById('name-input').value = names[n] || '';
    document.getElementById('btn-unsell').style.display = isSold ? 'block' : 'none';
    document.getElementById('ov-name').classList.add('show');
    setTimeout(() => document.getElementById('name-input').focus(), 150);
  }

  function closeNameModal() {
    document.getElementById('ov-name').classList.remove('show');
    activeNum = null;
  }

  function saveNumber() {
    if (!activeNum) return;
    const name = document.getElementById('name-input').value.trim();
    sold.add(activeNum);
    if (name) names[activeNum] = name; else delete names[activeNum];
    save(); render(); closeNameModal();
  }

  function unsellNumber() {
    if (!activeNum) return;
    sold.delete(activeNum);
    delete names[activeNum];
    save(); render(); closeNameModal();
  }

  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveNumber();
  });

  /* ── RESET ── */
  function resetAll() {
    sold.clear(); names = {};
    save(); render();
    document.getElementById('ov-reset').classList.remove('show');
  }

  /* ── TÓMBOLA ── */
  function openTombola() {
    clearInterval(spinTimer);
    document.getElementById('drum-num').textContent = '?';
    document.getElementById('t-name').textContent   = '';
    document.getElementById('drum').classList.remove('spinning');
    document.getElementById('ov-tombola').classList.add('show');
  }

  function closeTombola() {
    clearInterval(spinTimer);
    document.getElementById('drum').classList.remove('spinning');
    document.getElementById('ov-tombola').classList.remove('show');
  }

  function spinTombola() {
    clearInterval(spinTimer);
    const drum  = document.getElementById('drum');
    const numEl = document.getElementById('drum-num');
    const nameEl= document.getElementById('t-name');

    drum.classList.add('spinning');
    nameEl.textContent = '';
    numEl.textContent  = '?';

    let ticks = 0;
    const totalTicks = 28 + Math.floor(Math.random() * 18);

    spinTimer = setInterval(() => {
      numEl.textContent = Math.floor(Math.random() * TOTAL) + 1;
      ticks++;
      if (ticks >= totalTicks) {
        clearInterval(spinTimer);
        drum.classList.remove('spinning');
        const winner = Math.floor(Math.random() * TOTAL) + 1;
        numEl.textContent = winner;
        if (names[winner])    nameEl.textContent = '🎉 ' + names[winner];
        else if (sold.has(winner)) nameEl.textContent = '🎉 Número vendido';
        else                       nameEl.textContent = '📭 Número libre';
      }
    }, 75);
  }

  render();
</script>
</body>
</html>
