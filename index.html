<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>🎟️ Control de Rifa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      padding: 20px 14px 50px;
      color: #fff;
    }
    .header { text-align: center; margin-bottom: 18px; }
    .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
    .header p { font-size: 12px; color: #a0a0c0; margin-top: 4px; }
    .stats {
      display: flex; gap: 10px;
      max-width: 420px; margin: 0 auto 14px;
    }
    .stat {
      background: #16213e; border: 1px solid #2a2a5a;
      border-radius: 14px; padding: 12px 10px;
      text-align: center; flex: 1;
    }
    .stat .n { font-size: 28px; font-weight: 800; line-height: 1; }
    .stat .l { font-size: 10px; color: #a0a0c0; margin-top: 3px; text-transform: uppercase; letter-spacing: .5px; }
    .progress-wrap {
      max-width: 420px; margin: 0 auto 18px;
      background: #16213e; border-radius: 20px;
      height: 8px; overflow: hidden; border: 1px solid #2a2a5a;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #f72585, #7209b7);
      border-radius: 20px; transition: width .3s ease;
    }
    .grid {
      display: grid; grid-template-columns: repeat(10, 1fr);
      gap: 6px; max-width: 420px; margin: 0 auto;
    }
    .btn {
      aspect-ratio: 1; border-radius: 9px;
      border: 2px solid #2a2a5a; background: #16213e;
      color: #c8c8e8; font-size: 12px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none; transition: transform .1s;
      font-family: inherit;
    }
    .btn:active { transform: scale(.85); }
    .btn.sold {
      background: #f72585; border-color: #f72585;
      color: #fff; text-decoration: line-through; opacity: .9;
    }
    .legend {
      display: flex; justify-content: center;
      gap: 20px; margin-top: 16px;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #a0a0c0; }
    .dot { width: 14px; height: 14px; border-radius: 4px; }
    .reset-btn {
      display: block; margin: 24px auto 0;
      background: transparent; border: 1px solid #3a3a6a;
      color: #a0a0c0; font-size: 13px; padding: 10px 24px;
      border-radius: 20px; cursor: pointer; font-family: inherit;
    }
    /* Modal */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 50;
      align-items: flex-end; justify-content: center;
    }
    .overlay.show { display: flex; }
    .modal {
      background: #16213e; border-radius: 20px 20px 0 0;
      width: 100%; max-width: 480px;
      padding: 28px 24px 44px; border-top: 1px solid #2a2a5a;
    }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal p { font-size: 14px; color: #a0a0c0; margin-bottom: 24px; }
    .modal-btns { display: flex; gap: 12px; }
    .modal-btns button {
      flex: 1; padding: 14px; border-radius: 14px;
      font-size: 15px; font-weight: 600; border: none;
      cursor: pointer; font-family: inherit;
    }
    .btn-cancel { background: #2a2a5a; color: #a0a0c0; }
    .btn-confirm { background: #f72585; color: #fff; }
  </style>
</head>
<body>

<div class="header">
  <div style="font-size:28px;margin-bottom:4px">🎟️</div>
  <h1>Control de Rifa</h1>
  <p>Toca un número para marcarlo como vendido</p>
</div>

<div class="stats">
  <div class="stat"><div class="n" style="color:#f72585" id="n-sold">0</div><div class="l">Vendidos</div></div>
  <div class="stat"><div class="n" style="color:#4cc9f0" id="n-avail">250</div><div class="l">Disponibles</div></div>
  <div class="stat"><div class="n" style="color:#7b8cde">250</div><div class="l">Total</div></div>
</div>

<div class="progress-wrap">
  <div class="progress-bar" id="progress" style="width:0%"></div>
</div>

<div class="grid" id="grid"></div>

<div class="legend">
  <div class="legend-item">
    <div class="dot" style="background:#16213e;border:2px solid #2a2a5a"></div> Libre
  </div>
  <div class="legend-item">
    <div class="dot" style="background:#f72585"></div> Vendido
  </div>
</div>

<button class="reset-btn" onclick="document.getElementById('overlay').classList.add('show')">
  Reiniciar todo
</button>

<div class="overlay" id="overlay" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <h2>¿Reiniciar la rifa?</h2>
    <p>Se borrarán los 250 números marcados. No se puede deshacer.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('overlay').classList.remove('show')">Cancelar</button>
      <button class="btn-confirm" onclick="resetAll()">Sí, reiniciar</button>
    </div>
  </div>
</div>

<script>
  const TOTAL = 250;
  const KEY = 'rifa_250';
  let sold = new Set(JSON.parse(localStorage.getItem(KEY) || '[]'));

  function save() {
    localStorage.setItem(KEY, JSON.stringify([...sold]));
  }

  function updateStats() {
    document.getElementById('n-sold').textContent  = sold.size;
    document.getElementById('n-avail').textContent = TOTAL - sold.size;
    document.getElementById('progress').style.width = (sold.size / TOTAL * 100) + '%';
  }

  function render() {
    const grid = document.getElementById('grid');
    const btns = grid.querySelectorAll('.btn');
    if (btns.length === TOTAL) {
      btns.forEach((b, i) => {
        const n = i + 1;
        b.className = 'btn' + (sold.has(n) ? ' sold' : '');
      });
    } else {
      grid.innerHTML = '';
      for (let i = 1; i <= TOTAL; i++) {
        const b = document.createElement('button');
        b.className = 'btn' + (sold.has(i) ? ' sold' : '');
        b.textContent = i;
        b.onclick = () => toggle(i, b);
        grid.appendChild(b);
      }
    }
    updateStats();
  }

  function toggle(n, btn) {
    if (sold.has(n)) sold.delete(n); else sold.add(n);
    btn.className = 'btn' + (sold.has(n) ? ' sold' : '');
    save();
    updateStats();
  }

  function resetAll() {
    sold.clear();
    save();
    render();
    document.getElementById('overlay').classList.remove('show');
  }

  render();
</script>
</body>
</html>
